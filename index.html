          "@type": "Question",
          "name": "How does NikNote turn text into handwriting?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NikNote uses specially designed handwriting fonts with natural imperfections to produce output that looks authentically handwritten."
          }
        },
        {
          "@type": "Question",
          "name": "What file formats can I export?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can export as PDF (multi-page, A4, 300 DPI) and as PNG/JPG images per page."
          }
        },
        {
          "@type": "Question",
          "name": "Is NikNote free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! The free plan lets you export up to 2 pages per document with a small watermark. Paid plans remove the watermark and increase limits."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use NikNote on my phone?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. NikNote is fully responsive and works on any modern browser — desktop, tablet, or mobile."

    }
