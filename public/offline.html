<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NikNote — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #1a1a2e;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #64748b; margin-bottom: 24px; line-height: 1.6; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.9; }
    .hint { font-size: 11px; color: #94a3b8; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">✍️</div>
    <h1>You're Offline!</h1>
    <p>Tumhare notes safe hain! Internet wapas aane par sab kuch kaam karega. AI Teacher ke 28+ subjects offline bhi kaam karte hain!</p>
    <a href="/" class="btn">🔄 Try Again</a>
    <p class="hint">NikNote 4.0 — AI Study App by Nikhil Jatav</p>
  </div>
</body>
</html>
