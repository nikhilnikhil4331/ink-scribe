<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NikNote — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .emoji { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 24px; margin-bottom: 8px; font-weight: 700; }
    p { font-size: 16px; color: #666; margin-bottom: 24px; line-height: 1.6; }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      color: white;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: transform 0.15s;
    }
    .btn:active { transform: scale(0.95); }
    .hinglish { font-size: 13px; color: #999; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">✍️</div>
    <h1>You're Offline!</h1>
    <p>Internet connection nahi mil raha. Please check your connection and try again.</p>
    <a href="/" class="btn">Try Again</a>
    <p class="hinglish">Jab internet wapas aayega, NikNote automatically kaam karega! 🚀</p>
  </div>
</body>
</html>
